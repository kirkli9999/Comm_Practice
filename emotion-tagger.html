<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <title>情緒標籤平台 - Emotion Tagging Platform</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/emotion-tagger.css">
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <h1 class="app-brand">溝通氣場實踐工具</h1>
    <div style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap">
      <a href="index.html" style="font-size:0.7rem;color:var(--slate-400);text-decoration:none;border:1px solid rgba(255,255,255,0.2);padding:0.25rem 0.625rem;border-radius:999px;transition:all 0.15s" onmouseover="this.style.color='white';this.style.borderColor='rgba(255,255,255,0.5)'" onmouseout="this.style.color='';this.style.borderColor=''">六張紙片 →</a>
      <a href="ai-finance.html" style="font-size:0.7rem;color:var(--slate-400);text-decoration:none;border:1px solid rgba(255,255,255,0.2);padding:0.25rem 0.625rem;border-radius:999px;transition:all 0.15s" onmouseover="this.style.color='white';this.style.borderColor='rgba(255,255,255,0.5)'" onmouseout="this.style.color='';this.style.borderColor=''">AI 財務創新 →</a>
      <div class="header-badge">
        <span class="pulse-dot"></span>
        Emotion Tagging Platform
      </div>
    </div>
  </header>

  <main class="main-content" style="max-width:1060px">

    <!-- Page Title -->
    <div style="margin-bottom:1.25rem">
      <h2 style="font-size:1.1rem;font-weight:800;color:var(--slate-800);margin-bottom:0.25rem">
        情緒標籤平台
      </h2>
      <p style="font-size:0.8rem;color:var(--slate-600)">
        上傳或貼上文字，系統將自動分析每個句子的情緒，並提供整體情緒分佈圖。
      </p>
    </div>

    <!-- Emotion Legend -->
    <div class="card" style="margin-bottom:1rem;padding:0.75rem 1rem">
      <div class="card-title" style="margin-bottom:0.5rem">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
        情緒類別說明
      </div>
      <div class="et-legend" id="etLegend"></div>
    </div>

    <!-- Main 2-column layout -->
    <div class="et-layout">

      <!-- Left: Input Panel -->
      <div class="card et-input-panel">
        <h4 class="card-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          文字輸入
        </h4>

        <!-- Toolbar -->
        <div class="et-toolbar">
          <div class="et-toolbar-left">
            <button class="et-btn et-btn-ghost" id="etUploadBtn">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              上傳 .txt
            </button>
            <input type="file" id="etFileInput" accept=".txt,.md" style="display:none">
            <button class="et-btn et-btn-ghost" id="etDemoBtn">載入範例</button>
          </div>
          <span class="et-char-count" id="etCharCount">0 字</span>
        </div>

        <!-- Textarea -->
        <textarea
          class="et-textarea"
          id="etInput"
          placeholder="貼上逐字稿、會議記錄、日記、簡訊或任何文字內容…&#10;&#10;支援中文、英文混合輸入。系統將逐句分析情緒標籤。"
        ></textarea>

        <!-- Error -->
        <div class="et-error" id="etError"></div>

        <!-- Action Buttons -->
        <div class="et-btn-row">
          <button class="et-btn et-btn-secondary" id="etClearBtn">清除</button>
          <button class="et-btn et-btn-primary" id="etAnalyzeBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            分析情緒
          </button>
        </div>
      </div>

      <!-- Right: Results Panel -->
      <div class="card et-results-panel">
        <h4 class="card-title" style="justify-content:space-between">
          <span style="display:flex;align-items:center;gap:0.375rem">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            分析結果
          </span>
          <button class="et-btn et-btn-ghost" id="etCopyBtn" style="display:none">複製結果</button>
        </h4>

        <!-- Placeholder -->
        <div class="et-placeholder" id="etPlaceholder">
          <div class="et-placeholder-icon">🔍</div>
          <p class="et-placeholder-text">輸入文字後點擊「分析情緒」<br>查看每個句子的情緒標籤</p>
        </div>

        <!-- Results (hidden until analyzed) -->
        <div id="etResults" style="display:none">

          <!-- Summary Bar -->
          <div class="et-summary">
            <div class="et-summary-dominant">
              <span class="et-dominant-icon" id="etDominantIcon">😐</span>
              <div class="et-dominant-info">
                <div class="et-dominant-caption">主要情緒</div>
                <div class="et-dominant-label" id="etDominantLabel">—</div>
              </div>
            </div>
            <div class="et-summary-divider"></div>
            <div>
              <div class="et-dominant-caption">分析句數</div>
              <div class="et-sentence-count" id="etSentenceCount">—</div>
            </div>
          </div>

          <!-- Distribution -->
          <div class="et-section">
            <div class="et-section-title">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="18" y="3" width="4" height="18"/><rect x="10" y="8" width="4" height="13"/><rect x="2" y="13" width="4" height="8"/></svg>
              情緒分佈
            </div>
            <div id="etDistribution"></div>
          </div>

          <!-- Sentence Breakdown -->
          <div class="et-section">
            <div class="et-section-title">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
              逐句分析
            </div>
            <div class="et-sentence-list" id="etSentenceList"></div>
          </div>

        </div>
      </div>

    </div>
    <!-- end .et-layout -->

  </main>

  <script src="js/emotion-tagger.js"></script>
  <script>
    // Render legend on load
    document.addEventListener('DOMContentLoaded', function() {
      var legend = document.getElementById('etLegend');
      Object.keys(EMOTIONS).forEach(function(k) {
        var e = EMOTIONS[k];
        var pill = document.createElement('span');
        pill.className = 'et-pill';
        pill.style.cssText = 'background:' + e.bg + ';color:' + e.color + ';border:1px solid ' + e.border + ';font-size:0.7rem;padding:0.15rem 0.6rem;font-weight:600;border-radius:999px';
        pill.textContent = e.icon + ' ' + e.label;
        legend.appendChild(pill);
      });

      // Show copy button when results rendered
      var origRender = etRenderResults;
      document.getElementById('etCopyBtn').style.display = 'inline-flex';
    });
  </script>
</body>
</html>
